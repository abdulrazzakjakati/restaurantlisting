# sonar-project.properties in your project root
sonar.projectKey=restaurantlisting
sonar.projectName=Restaurant Listing
sonar.projectVersion=1.0

# Source directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Exclude configuration classes
sonar.exclusions=**/config/**, **/WebConfig.java

# Exclude from coverage
sonar.coverage.exclusions=**/config/**, **/WebConfig.java